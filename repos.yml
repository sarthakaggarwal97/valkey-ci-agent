schema_version: 2
repos:
  - repo: valkey-io/valkey
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    automation:
      enabled: true
      daily_ai_requests: 24
      daily_input_tokens: 2000000
      daily_output_tokens: 500000
      daily_cost_microusd: 20000000
      max_queue_depth: 4
      failure_threshold: 3
      circuit_cooldown_seconds: 21600
      max_publications_per_day: 20
      run_ai_requests: 8
    validation:
      adapter: container-argv-v1
      image: "gcc@sha256:5e927c284bf55a7dc796262e311a0703344f62f41f5621eb56843111b1d37e15"
      platform: linux/amd64
      network: none
      resources:
        cpus: 2
        memory_mb: 4096
        pids: 512
        output_bytes: 16777216
        tmpfs_mb: 512
      default_commands: [build]
      commands:
        - id: build
          argv: ["make", "-j2"]
          working_directory: "."
          timeout_seconds: 1800
          inputs: ["**"]
          expected_artifacts: ["src/valkey-server"]
      rules: []
    repair_validation_failures: true
    backport_label: backport
    llm_conflict_label: ai-resolved-conflicts
    max_conflicting_files: 100
    branches:
      - branch: "7.2"
        project_number: 1
      - branch: "8.0"
        project_number: 2
      - branch: "8.1"
        project_number: 14
      - branch: "9.0"
        project_number: 18
      - branch: "9.1"
        project_number: 41

  - repo: valkey-io/valkey-search
    project_owner: valkey-io
    project_owner_type: organization
    language: c++
    automation:
      enabled: true
      daily_ai_requests: 8
      daily_input_tokens: 500000
      daily_output_tokens: 100000
      daily_cost_microusd: 5000000
      max_queue_depth: 1
      failure_threshold: 2
      circuit_cooldown_seconds: 43200
      max_publications_per_day: 5
      run_ai_requests: 4
    validation:
      adapter: container-argv-v2
      image: "mcr.microsoft.com/devcontainers/cpp@sha256:d51703c4fcbe93cd889d38005847521d87cca4d304f33423430daf10a384a332"
      platform: linux/amd64
      network: none
      resources:
        cpus: 2
        memory_mb: 8192
        pids: 2048
        output_bytes: 33554432
        tmpfs_mb: 1024
      immutable_inputs:
        - id: search-deps
          url: "https://github.com/valkey-io/valkey-search/releases/download/1.0.0-rc1/valkey-search-deps-ubuntu-noble-amd64.deb"
          sha256: "2aba36cafd6a94c54ca11a15409e86db2705bfa8fe38fbd9c5c4c758dca3c69f"
          size_bytes: 20798028
          format: deb
      default_commands: [build-and-test]
      commands:
        - id: build-and-test
          argv:
            - /usr/bin/env
            - "CMAKE_PREFIX_PATH=/validation-inputs/search-deps/opt/valkey-search-deps/lib/cmake/protobuf:/validation-inputs/search-deps/opt/valkey-search-deps/lib/cmake/absl:/validation-inputs/search-deps/opt/valkey-search-deps/lib/cmake/grpc:/validation-inputs/search-deps/opt/valkey-search-deps/lib/cmake/GTest:/validation-inputs/search-deps/opt/valkey-search-deps/lib/cmake/utf8_range:/validation-inputs/search-deps/opt/valkey-search-deps"
            - ./build.sh
            - --use-system-modules
            - --test-errors-stdout
            - --run-tests
            - --jobs=2
          working_directory: "."
          timeout_seconds: 3600
          inputs: ["**"]
          expected_artifacts:
            - .build-release/libsearch.so
            - .build-release/tests.out
      rules: []
    repair_validation_failures: true
    backport_label: backport
    llm_conflict_label: ai-resolved-conflicts
    max_conflicting_files: 100
    branches:
      - branch: "1.0"
        project_number: 36
      - branch: "1.1"
        project_number: 34
      - branch: "1.2"
        project_number: 58
