# Example registry showing how to onboard a Valkey module.
# This file is for documentation only — the live registry is repos.yml at the repo root.
#
# Standard deployment model:
#
# The agent pushes `agent/backport/...` branches directly to repo and opens
# draft PRs in that same upstream repository. `push_repo` is optional and only
# for a different-owner fork escape hatch.

repos:
  - repo: valkey-io/valkey
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    ci_fix:
      enabled: true
      poll_comments: true
      authorization_org: valkey-io
      authorization_team: contributors
      allowed_branch_prefixes:
        - "agent/backport/"
      history_branches: ["7.2", "8.0", "8.1", "9.0", "9.1"]
      baseline_runs: 5
      flaky_verify_runs: 20
      remote_parallelism: 5
      remote_sample_timeout_minutes: 15
      remote_budget_minutes: 45
      minimum_confidence: 0.8
      # Enable these together after the protected workflow is installed in the
      # target repository:
      verification_workflow: .github/workflows/ci-agent-verify.yml
      verification_ref: protected-verifier
      protected_paths:
        - ".github/workflows/**"
        - ".github/actions/**"
        - "**/CODEOWNERS"
      auto_publish_paths:
        - "tests/**"
        - "src/unit/**"
    build_commands:
      - "make -j$(nproc)"
    backport_label: backport
    llm_conflict_label: ai-resolved-conflicts
    max_conflicting_files: 100
    branches:
      - branch: "7.2"
        project_number: 1
      - branch: "8.0"
        project_number: 2
      - branch: "8.1"
        project_number: 14
      - branch: "9.0"
        project_number: 18
      - branch: "9.1"
        project_number: 41

  - repo: valkey-io/valkey-bloom
    project_owner: valkey-io
    project_owner_type: organization
    language: c
    build_commands:
      - "make -j$(nproc)"
    branches:
      - branch: "1.0"
        project_number: 5

  - repo: valkey-io/valkey-search
    project_owner: valkey-io
    project_owner_type: organization
    language: c++
    ci_fix:
      enabled: true
      poll_comments: true
      history_branches: ["1.0", "1.1", "1.2"]
      baseline_runs: 5
      flaky_verify_runs: 20
      minimum_confidence: 0.8
      protected_paths:
        - ".github/workflows/**"
        - ".github/actions/**"
        - "**/CODEOWNERS"
      auto_publish_paths:
        - "tests/**"
        - "src/**/tests/**"
    validation_setup_commands:
      - "docker build -t valkey-search-backport -f .devcontainer/Dockerfile ."
    build_commands:
      - "docker run --privileged --rm -v \"$(pwd):/workspace\" --user \"ubuntu:ubuntu\" valkey-search-backport sudo ci/build_ubuntu.sh"
    repair_validation_failures: true
    branches:
      - branch: "1.0"
        project_number: 8
