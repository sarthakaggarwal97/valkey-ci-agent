name: CI Fix Bot
run-name: "CI fix ${{ inputs.repo }}#${{ inputs.pr }} [ci-fix-comment:${{ inputs.repo }}:${{ (github.actor == 'valkeyrie-ops[bot]' && inputs.comment_id) || format('manual-{0}', github.run_id) }}]"

# A maintainer triggers a fix manually or through the registry-driven comment
# poller. The target must have ci_fix.enabled in repos.yml. Registry resolution
# happens before any target-repository credential is minted.
on:
  workflow_dispatch:
    inputs:
      repo:
        description: "PR repository, e.g. valkey-io/valkey"
        required: true
        type: string
      pr:
        description: "Backport PR number"
        required: true
        type: number
      run_url:
        description: "Failed GitHub Actions run URL"
        required: true
        type: string
      hint:
        description: "Optional diagnosis hint"
        required: false
        type: string
      commenter:
        description: "Requesting user (honored only when dispatched by the trusted poller App)"
        required: false
        type: string
      comment_id:
        description: "Triggering comment id, reacted to with the run outcome"
        required: false
        type: string

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  registry:
    name: Resolve target repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      owner: ${{ steps.resolve.outputs.owner }}
      name: ${{ steps.resolve.outputs.name }}
      verification_workflow: ${{ steps.resolve.outputs.verification_workflow }}
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent

      - name: Resolve CI-fix target
        id: resolve
        env:
          CI_FIX_REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          python -m scripts.ci_fix.registry resolve \
            --registry repos.yml \
            --repo "${CI_FIX_REPO}" \
            --output-file "${GITHUB_OUTPUT}"

  ci-fix:
    needs: registry
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
    concurrency:
      # Serialize ci-fix runs for the same PR so two dispatches don't push at
      # once. This does not coordinate with other workflows that write the same
      # branch; the fast-forward-only push (see push.py) is what keeps a
      # concurrent branch update from being clobbered.
      group: ci-fix-${{ needs.registry.outputs.owner }}-${{ needs.registry.outputs.name }}-${{ inputs.pr }}
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      CLAUDE_CODE_USE_BEDROCK: "1"
      CI_AGENT_EVIDENCE_DIR: agent-evidence
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent
        with:
          install-claude: "true"
          install-sandbox: "true"

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: ${{ needs.registry.outputs.owner }}
          repositories: ${{ needs.registry.outputs.name }}
          # members:read for the contributors-team auth check; contents:write
          # to push the fix; pull-requests:write + issues:write to comment (the
          # PR comment uses the Issues comments API). actions:write is granted
          # only when the registry names a target-owned verifier; it can
          # dispatch that fixed workflow but cannot edit workflow files.
          permission-members: read
          permission-actions: ${{ needs.registry.outputs.verification_workflow != '' && 'write' || 'read' }}
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-metadata: read

      - name: Generate agent-repo verifier token
        id: agent-token
        if: needs.registry.outputs.verification_workflow == ''
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey-ci-agent
          # actions:write dispatches credential-free Linux/macOS verifier
          # workflows and reads their run status; no repository contents write.
          permission-actions: write
          permission-metadata: read

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-ci-fix-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run the CI fix
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token }}
          CI_FIX_APP_ID: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          CI_FIX_APP_PRIVATE_KEY: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          CI_FIX_TARGET_INSTALLATION_ID: ${{ steps.generate-token.outputs.installation-id }}
          CI_FIX_AGENT_REPO: valkey-io/valkey-ci-agent
          CI_FIX_AGENT_REF: main
          CI_FIX_AGENT_TOKEN: ${{ steps.agent-token.outputs.token }}
          CI_FIX_AGENT_INSTALLATION_ID: ${{ steps.agent-token.outputs.installation-id }}
          CI_FIX_REPO: ${{ inputs.repo }}
          CI_FIX_PR: ${{ inputs.pr }}
          CI_FIX_RUN_URL: ${{ inputs.run_url }}
          CI_FIX_VERIFY_RUNS: ${{ vars.CI_FIX_VERIFY_RUNS || '2' }}
          # The commenter input is honored only when the trusted poller App
          # dispatched this run; any other dispatcher (a human via the Actions
          # UI) falls back to github.actor, so a manual run cannot rewrite the
          # audit attribution. The engine's authorization check runs against
          # whichever principal is chosen regardless.
          CI_FIX_COMMENTER: ${{ (github.actor == 'valkeyrie-ops[bot]' && inputs.commenter) || github.actor }}
          CI_FIX_HINT: ${{ inputs.hint || '' }}
          # A manual dispatcher may type any comment id. Only the poller App's
          # authenticated dispatch is allowed to associate outcome reactions
          # with a target-repository comment.
          CI_FIX_COMMENT_ID: ${{ (github.actor == 'valkeyrie-ops[bot]' && inputs.comment_id) || '' }}
          CI_FIX_REGISTRY: repos.yml
        run: |
          set -euo pipefail
          if [[ ! "${CI_FIX_PR}" =~ ^[0-9]+$ ]]; then
            echo "Invalid PR number: ${CI_FIX_PR}" >&2
            exit 1
          fi
          args=(
            -m scripts.ci_fix.main
            --repo "${CI_FIX_REPO}"
            --pr "${CI_FIX_PR}"
            --run-url "${CI_FIX_RUN_URL}"
            --commenter "${CI_FIX_COMMENTER}"
            --registry "${CI_FIX_REGISTRY}"
          )
          if [[ -n "${CI_FIX_HINT}" ]]; then
            args+=(--hint "${CI_FIX_HINT}")
          fi
          python "${args[@]}"

      - name: Upload agent evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-fix-agent-evidence-${{ github.run_id }}
          path: agent-evidence
          if-no-files-found: ignore
          retention-days: 30
