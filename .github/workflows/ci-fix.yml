name: CI Fix Bot

# A maintainer triggers a fix manually via workflow_dispatch (the Actions UI or
# `gh workflow run`), supplying the PR and the failing run URL. The target must
# be explicitly enabled for CI fixing in repos.yml. The comment poller handles
# `@valkeyrie-ops fix ...` commands in every enabled repository.
on:
  workflow_dispatch:
    inputs:
      repo:
        description: "CI-fix-enabled target repository, e.g. valkey-io/valkey"
        required: true
        type: string
      pr:
        description: "Backport PR number (set either pr or issue)"
        required: false
        type: number
        default: 0
      issue:
        description: "Open source issue number for a new draft PR (set either issue or pr)"
        required: false
        type: number
        default: 0
      run_url:
        description: "Failed Actions run URL (optional only when a detector issue records one)"
        required: false
        type: string
      hint:
        description: "Optional diagnosis hint"
        required: false
        type: string
      commenter:
        description: "Requesting user (honored only when dispatched by the trusted poller App)"
        required: false
        type: string
      comment_id:
        description: "Triggering comment id, reacted to with the run outcome"
        required: false
        type: string

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-fix:
    runs-on: ubuntu-latest
    # Issue mode must finish while the one-hour GitHub App and AWS sessions are
    # still valid so publication and outcome reporting cannot fail on expiry.
    timeout-minutes: ${{ inputs.issue > 0 && 55 || 90 }}
    permissions:
      contents: read
      id-token: write
    concurrency:
      # Serialize ci-fix runs for the same PR so two dispatches don't push at
      # once. This does not coordinate with other workflows that write the same
      # branch; the fast-forward-only push (see push.py) is what keeps a
      # concurrent branch update from being clobbered.
      group: ci-fix-${{ inputs.repo }}-${{ inputs.issue > 0 && format('issue-{0}', inputs.issue) || format('pr-{0}', inputs.pr) }}
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      CLAUDE_CODE_USE_BEDROCK: "1"
      CI_AGENT_EVIDENCE_DIR: agent-evidence
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent
        with:
          install-claude: "true"

      - name: Resolve target repository
        id: target
        shell: bash
        env:
          CI_FIX_REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail
          python -m scripts.ci_fix.registry \
            --registry repos.yml \
            resolve \
            --repo "${CI_FIX_REPO}" >> "${GITHUB_OUTPUT}"

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: ${{ steps.target.outputs.owner }}
          repositories: ${{ steps.target.outputs.name }}
          # members:read for the contributors-team auth check; contents:write
          # to push the fix; pull-requests:write + issues:write to comment (the
          # PR comment uses the Issues comments API); actions:read for logs.
          permission-members: read
          permission-actions: read
          permission-contents: write
          permission-workflows: write
          permission-pull-requests: write
          permission-issues: write
          permission-metadata: read

      - name: Generate agent-repo token (macOS verify dispatch)
        id: agent-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey-ci-agent
          # actions:write to dispatch the verify-macos workflow and read its
          # run status; nothing else on the agent repo.
          permission-actions: write
          permission-metadata: read

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-ci-fix-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run the CI fix
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token }}
          CI_FIX_MACOS_AGENT_REPO: valkey-io/valkey-ci-agent
          CI_FIX_MACOS_AGENT_REF: main
          CI_FIX_MACOS_TOKEN: ${{ steps.agent-token.outputs.token }}
          CI_FIX_REPO: ${{ inputs.repo }}
          CI_FIX_PR: ${{ inputs.pr }}
          CI_FIX_ISSUE: ${{ inputs.issue }}
          CI_FIX_RUN_URL: ${{ inputs.run_url }}
          CI_FIX_VERIFY_RUNS: ${{ vars.CI_FIX_VERIFY_RUNS || '2' }}
          CI_FIX_ISSUE_VERIFY_RUNS: ${{ vars.CI_FIX_ISSUE_VERIFY_RUNS || '5' }}
          CI_FIX_ISSUE_BASELINE_RUNS: ${{ vars.CI_FIX_ISSUE_BASELINE_RUNS || '5' }}
          # The commenter input is honored only when the trusted poller App
          # dispatched this run; any other dispatcher (a human via the Actions
          # UI) falls back to github.actor, so a manual run cannot rewrite the
          # audit attribution. The engine's authorization check runs against
          # whichever principal is chosen regardless.
          CI_FIX_COMMENTER: ${{ (github.actor == 'valkeyrie-ops[bot]' && inputs.commenter) || github.actor }}
          CI_FIX_HINT: ${{ inputs.hint || '' }}
          CI_FIX_COMMENT_ID: ${{ inputs.comment_id || '' }}
          CI_FIX_AUTH_ORG: ${{ steps.target.outputs.owner }}
          CI_FIX_DETECTOR_LOGIN: ${{ format('{0}[bot]', steps.generate-token.outputs.app-slug) }}
        run: |
          set -euo pipefail
          if [[ ! "${CI_FIX_REPO}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid repo: ${CI_FIX_REPO}" >&2
            exit 1
          fi
          if [[ ! "${CI_FIX_PR}" =~ ^[0-9]+$ ]] || [[ ! "${CI_FIX_ISSUE}" =~ ^[0-9]+$ ]]; then
            echo "Invalid pr or issue number: pr=${CI_FIX_PR} issue=${CI_FIX_ISSUE}" >&2
            exit 1
          fi
          if (( (CI_FIX_PR > 0) == (CI_FIX_ISSUE > 0) )); then
            echo "Set exactly one of pr or issue" >&2
            exit 1
          fi
          args=(
            -m
          )
          if (( CI_FIX_PR > 0 )); then
            if [[ -z "${CI_FIX_RUN_URL}" ]]; then
              echo "run_url is required for PR fixes" >&2
              exit 1
            fi
            args+=(
              scripts.ci_fix.main
              --pr "${CI_FIX_PR}"
            )
          else
            args+=(
              scripts.ci_fix.issue_main
              --issue "${CI_FIX_ISSUE}"
            )
          fi
          args+=(
            --repo "${CI_FIX_REPO}"
            --commenter "${CI_FIX_COMMENTER}"
          )
          if [[ -n "${CI_FIX_RUN_URL}" ]]; then
            args+=(--run-url "${CI_FIX_RUN_URL}")
          fi
          if [[ -n "${CI_FIX_HINT}" ]]; then
            args+=(--hint "${CI_FIX_HINT}")
          fi
          python "${args[@]}"

      - name: Upload agent evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-fix-agent-evidence-${{ github.run_id }}
          path: agent-evidence
          if-no-files-found: ignore
          retention-days: 30
