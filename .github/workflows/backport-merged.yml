name: Backport Merged Status

on:
  workflow_call:
    inputs:
      repo_full_name:
        description: "Full repository name containing the merged backport PR"
        required: true
        type: string
      target_branch:
        description: "Release branch the backport PR was merged into"
        required: true
        type: string
      backport_pr_body:
        description: "Merged backport PR body"
        required: false
        type: string
        default: ""
      backport_pr_head_ref:
        description: "Merged backport PR head ref"
        required: false
        type: string
        default: ""
    secrets:
      VALKEYRIE_BOT_APP_ID:
        required: true
      VALKEYRIE_BOT_PRIVATE_KEY:
        required: true
  workflow_dispatch:
    inputs:
      repo_full_name:
        description: "Full repository name containing the merged backport PR"
        required: true
        type: string
      target_branch:
        description: "Release branch the backport PR was merged into"
        required: true
        type: string
      source_pr_number:
        description: "Source PR number to mark done"
        required: true
        type: number

permissions: {}

jobs:
  mark-done:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve called workflow ref
        id: called-workflow
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken('valkey-ci-agent');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString('utf8'));
            const workflowRef = payload.job_workflow_ref || '';
            const marker = '/.github/workflows/';
            const markerIndex = workflowRef.indexOf(marker);
            const refIndex = workflowRef.lastIndexOf('@');
            if (markerIndex <= 0 || refIndex <= markerIndex) {
              core.warning(`Could not resolve called workflow repository/ref from job_workflow_ref: ${workflowRef}; using current repository/ref`);
              core.setOutput('repository', `${context.repo.owner}/${context.repo.repo}`);
              core.setOutput('ref', context.ref.replace(/^refs\/heads\//, ''));
              return;
            }
            core.setOutput('repository', workflowRef.slice(0, markerIndex));
            core.setOutput('ref', workflowRef.slice(refIndex + 1));

      - name: Check out agent repository
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.called-workflow.outputs.repository || github.repository }}
          ref: ${{ steps.called-workflow.outputs.ref || github.ref }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io

      - name: Mark source PR backport status done
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token }}
          REPO_FULL_NAME: ${{ inputs.repo_full_name }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          BACKPORT_PR_BODY: ${{ inputs.backport_pr_body || '' }}
          BACKPORT_PR_HEAD_REF: ${{ inputs.backport_pr_head_ref || '' }}
          SOURCE_PR_NUMBER: ${{ inputs.source_pr_number || '' }}
        run: |
          set -euo pipefail
          if [[ ! "${REPO_FULL_NAME}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid repo_full_name: ${REPO_FULL_NAME}" >&2
            exit 1
          fi
          if [[ ! "${TARGET_BRANCH}" =~ ^[A-Za-z0-9._/-]+$ || "${TARGET_BRANCH}" == -* || "${TARGET_BRANCH}" == *..* ]]; then
            echo "Invalid target_branch: ${TARGET_BRANCH}" >&2
            exit 1
          fi

          body_file="$(mktemp)"
          printf '%s' "${BACKPORT_PR_BODY}" > "${body_file}"
          args=(
            -m scripts.backport.mark_done
            --registry repos.yml
            --repo "${REPO_FULL_NAME}"
            --target-branch "${TARGET_BRANCH}"
            --target-token "${TARGET_TOKEN}"
            --body-file "${body_file}"
            --head-ref "${BACKPORT_PR_HEAD_REF}"
            --verbose
          )
          if [[ -n "${SOURCE_PR_NUMBER}" ]]; then
            args+=(--source-pr-number "${SOURCE_PR_NUMBER}")
          fi
          python "${args[@]}"
