name: Backport Mark Done Poll

# Self-healing reconcile of project-board backport status. For every
# "To be backported" item, verify immutable publisher provenance and the
# backport merge commit's target-branch ancestry before flipping it to Done.

on:
  schedule:
    # Hourly, offset from the daily sweep so a sweep's results get picked up soon.
    - cron: "30 * * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Filter to this repository (empty = all repos in registry)"
        required: false
        type: string
        default: ""
      project_number:
        description: "Filter to this project number (empty = all)"
        required: false
        type: string
        default: ""

permissions: {}

jobs:
  preflight:
    name: "Generate matrix"
    if: >-
      ${{
        github.repository == 'valkey-io/valkey-ci-agent' &&
        vars.VALKEY_CI_AGENT_KILL_SWITCH != 'true' &&
        vars.VALKEY_CI_AGENT_DISABLE_BACKPORT != 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_entries: ${{ steps.matrix.outputs.has_entries }}
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent

      - name: Generate matrix from registry
        id: matrix
        shell: bash
        env:
          REPO_FILTER: ${{ inputs.repo || '' }}
          PROJECT_FILTER: ${{ inputs.project_number || '' }}
        run: |
          set -euo pipefail
          args=(--registry repos.yml)
          if [[ -n "${REPO_FILTER}" ]]; then
            args+=(--repo "${REPO_FILTER}")
          fi
          if [[ -n "${PROJECT_FILTER}" ]]; then
            args+=(--project-number "${PROJECT_FILTER}")
          fi
          python -m scripts.backport.matrix "${args[@]}" --output-file "$GITHUB_OUTPUT"

  reconcile:
    name: "mark-done/${{ matrix.repo }}/${{ matrix.branch }}"
    needs: preflight
    if: >-
      ${{
        needs.preflight.outputs.has_entries == 'true' &&
        vars.VALKEY_CI_AGENT_KILL_SWITCH != 'true' &&
        vars.VALKEY_CI_AGENT_DISABLE_BACKPORT != 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.preflight.outputs.matrix) }}
    concurrency:
      group: backport-mark-done-${{ matrix.repo }}-${{ matrix.branch }}
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      POLL_INTERVAL_SECONDS: ${{ github.event_name == 'schedule' && '1800' || '0' }}
      POLL_DURATION_SECONDS: ${{ github.event_name == 'schedule' && '3300' || '0' }}
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent

      - name: Reserve mark-done publication before token minting
        shell: bash
        env:
          TARGET_REPOSITORY: ${{ matrix.repo }}
          TARGET_BRANCH: ${{ matrix.branch }}
          AI_GATEWAY_UPSTREAM_URL: ${{ vars.AI_GATEWAY_UPSTREAM_URL }}
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
          VALKEY_CI_AGENT_KILL_SWITCH: ${{ vars.VALKEY_CI_AGENT_KILL_SWITCH || 'false' }}
          VALKEY_CI_AGENT_DISABLED_REPOSITORIES: ${{ vars.VALKEY_CI_AGENT_DISABLED_REPOSITORIES || '' }}
        run: |
          set -euo pipefail
          python -m scripts.common.operational_controls \
            --registry repos.yml \
            --repo "${TARGET_REPOSITORY}" \
            --operation backport:mark-done \
            --admit-publication-key \
              "${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}:${TARGET_BRANCH}" \
            >/dev/null

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          permission-contents: read
          permission-pull-requests: read
          permission-organization-projects: write
          permission-metadata: read

      - name: Reconcile board status against branch
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token }}
          REPO: ${{ matrix.repo }}
          BRANCH: ${{ matrix.branch }}
        run: |
          set -euo pipefail
          python -m scripts.backport.mark_done \
            --registry repos.yml \
            --repo "${REPO}" \
            --target-branch "${BRANCH}" \
            --target-token "${TARGET_TOKEN}" \
            --poll-interval-seconds "${POLL_INTERVAL_SECONDS}" \
            --poll-duration-seconds "${POLL_DURATION_SECONDS}" \
            --verbose | tee mark-done-result.json

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mark-done-result-${{ github.run_id }}-${{ matrix.repo_slug }}-${{ matrix.branch }}
          path: mark-done-result.json
          retention-days: 30
