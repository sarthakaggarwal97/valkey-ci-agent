name: Analyze CI Failure

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the bot configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/ci-failure-bot.yml"
      mode:
        description: "Pipeline mode: 'analyze' for failure processing, 'reconcile' for draining queued failures"
        required: false
        type: string
        default: "analyze"
      aws_region:
        description: "AWS region where Bedrock is available"
        required: false
        type: string
        default: "us-east-1"
    secrets:
      AWS_ROLE_ARN:
        required: true
      VALKEY_GITHUB_APP_ID:
        description: "GitHub App ID for the bot identity (optional, falls back to github.token)"
        required: false
      VALKEY_GITHUB_APP_PRIVATE_KEY:
        description: "GitHub App private key for the bot identity (optional, falls back to github.token)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Checkout bot repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate GitHub App token
        if: ${{ secrets.VALKEY_GITHUB_APP_ID != '' && secrets.VALKEY_GITHUB_APP_PRIVATE_KEY != '' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VALKEY_GITHUB_APP_ID }}
          private-key: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-ci-agent-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Run analysis pipeline
        if: inputs.mode == 'analyze'
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          python -m scripts.main \
            --repo "${{ github.event.workflow_run.repository.full_name || github.repository }}" \
            --run-id "${{ github.event.workflow_run.id }}" \
            --config "${{ inputs.config_path }}" \
            --token "${{ steps.app-token.outputs.token || github.token }}" \
            --aws-region "${{ inputs.aws_region }}"

      - name: Run reconciliation
        if: inputs.mode == 'reconcile'
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          python -m scripts.main \
            --repo "${{ github.repository }}" \
            --config "${{ inputs.config_path }}" \
            --token "${{ steps.app-token.outputs.token || github.token }}" \
            --aws-region "${{ inputs.aws_region }}" \
            --mode reconcile
