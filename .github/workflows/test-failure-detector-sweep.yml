name: Test Failure Detector

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to scan (default: valkey-io/valkey)"
        required: false
        type: string
        default: "valkey-io/valkey"
      run_id:
        description: "Specific workflow run ID to analyze (empty = latest completed Daily run)"
        required: false
        type: string
        default: ""
      dry_run:
        description: "Parse and report only — don't create/update issues"
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: test-failure-detector-publisher-${{ inputs.repo || 'valkey-io/valkey' }}
  cancel-in-progress: false

jobs:
  detect-failures:
    name: "Detect test failures"
    if: >
      (github.event_name == 'workflow_dispatch' ||
      github.repository == 'valkey-io/valkey-ci-agent') &&
      vars.VALKEY_CI_AGENT_KILL_SWITCH != 'true' &&
      vars.VALKEY_CI_AGENT_DISABLE_TEST_FAILURE_DETECTOR != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent

      - name: Reserve issue publication before token minting
        shell: bash
        env:
          TARGET_REPOSITORY: ${{ inputs.repo || 'valkey-io/valkey' }}
          AI_GATEWAY_UPSTREAM_URL: ${{ vars.AI_GATEWAY_UPSTREAM_URL }}
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
          VALKEY_CI_AGENT_KILL_SWITCH: ${{ vars.VALKEY_CI_AGENT_KILL_SWITCH || 'false' }}
          VALKEY_CI_AGENT_DISABLED_REPOSITORIES: ${{ vars.VALKEY_CI_AGENT_DISABLED_REPOSITORIES || '' }}
        run: |
          set -euo pipefail
          test "${TARGET_REPOSITORY}" = "valkey-io/valkey"
          python -m scripts.common.operational_controls \
            --registry repos.yml \
            --repo "${TARGET_REPOSITORY}" \
            --operation test-failure:publish \
            --admit-publication-key \
              "${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}:test-failure" \
            >/dev/null

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey
          permission-actions: read
          permission-issues: write
          permission-metadata: read

      - name: Run test failure detector
        env:
          TARGET_TOKEN: ${{ steps.generate-token.outputs.token }}
          TARGET_REPO: ${{ inputs.repo || 'valkey-io/valkey' }}
          RUN_ID: ${{ inputs.run_id || '' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && 'true' || 'false' }}
        run: |
          set -euo pipefail
          args=(
            -m scripts.test_failure_detector.main
            --token "${TARGET_TOKEN}"
            --repo "${TARGET_REPO}"
            --verbose
          )

          if [[ -n "${RUN_ID}" ]]; then
            args+=(--run-id "${RUN_ID}")
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi

          python "${args[@]}"
