name: Backport PR

on:
  workflow_call:
    inputs:
      source_pr_number:
        description: "The merged PR number to backport"
        required: true
        type: number
      repo_full_name:
        description: "Full repository name (owner/repo) containing the source PR"
        required: true
        type: string
      target_branch:
        description: "Target release branch to cherry-pick onto (e.g. 8.1)"
        required: true
        type: string
      config_path:
        description: "Path to the backport agent configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/backport-agent.yml"
    secrets:
      AWS_ROLE_ARN:
        required: false
      VALKEY_GITHUB_TOKEN:
        required: false
      VALKEY_GITHUB_APP_ID:
        description: "GitHub App ID for the bot identity (optional, falls back to github.token)"
        required: false
      VALKEY_GITHUB_APP_PRIVATE_KEY:
        description: "GitHub App private key for the bot identity (optional, falls back to github.token)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1

jobs:
  backport:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Checkout agent repository
        uses: actions/checkout@v6
        with:
          repository: sarthakaggarwal97/valkey-ci-agent
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate GitHub App token
        if: ${{ secrets.VALKEY_GITHUB_APP_ID != '' && secrets.VALKEY_GITHUB_APP_PRIVATE_KEY != '' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VALKEY_GITHUB_APP_ID }}
          private-key: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-backport-agent-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run backport pipeline
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          python -m scripts.backport_main \
            --repo "${{ inputs.repo_full_name }}" \
            --pr-number "${{ inputs.source_pr_number }}" \
            --target-branch "${{ inputs.target_branch }}" \
            --config "${{ inputs.config_path }}" \
            --token "${{ steps.app-token.outputs.token || secrets.VALKEY_GITHUB_TOKEN || github.token }}" \
            --aws-region "${{ env.AWS_REGION }}"
