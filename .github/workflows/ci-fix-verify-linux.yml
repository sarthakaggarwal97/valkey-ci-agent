name: CI Fix Verify Linux

# Runs one clean-baseline or candidate sample away from the credential-bearing
# controller. The dispatched job has no repository permissions, secrets, or
# cloud identity. Each repetition gets a fresh GitHub-hosted runner.

run-name: "verify-linux [token:${{ inputs.correlation }}]"

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Public target repo (owner/name) to verify"
        required: true
        type: string
      head_sha:
        description: "Commit SHA to check out"
        required: true
        type: string
      patch_b64:
        description: "Base64 candidate patch; empty for a baseline"
        required: false
        type: string
        default: ""
      verify_command:
        description: "Targeted build and test command"
        required: true
        type: string
      workdir:
        description: "Relative command working directory"
        required: false
        type: string
        default: ""
      container_image:
        description: "Static container image; empty for host Linux"
        required: false
        type: string
        default: ""
      phase:
        description: "baseline or candidate"
        required: true
        type: string
      repetition:
        description: "One-based sample index"
        required: true
        type: string
      repetition_count:
        description: "Total samples in this campaign"
        required: true
        type: string
      correlation:
        description: "Correlation token echoed in the run name"
        required: true
        type: string

permissions: {}

jobs:
  verify-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate inputs
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          HEAD_SHA: ${{ inputs.head_sha }}
          PATCH_B64: ${{ inputs.patch_b64 }}
          VERIFY_WORKDIR: ${{ inputs.workdir }}
          CONTAINER_IMAGE: ${{ inputs.container_image }}
          VERIFY_PHASE: ${{ inputs.phase }}
          REPETITION: ${{ inputs.repetition }}
          REPETITION_COUNT: ${{ inputs.repetition_count }}
        run: |
          set -euo pipefail
          target_owner="${TARGET_REPO%%/*}"
          target_name="${TARGET_REPO#*/}"
          if [[ ! "${TARGET_REPO}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ || "${target_owner}" == "." || "${target_owner}" == ".." || "${target_name}" == "." || "${target_name}" == ".." ]]; then
            echo "Invalid target_repo" >&2
            exit 1
          fi
          if [[ ! "${HEAD_SHA}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "Invalid head_sha" >&2
            exit 1
          fi
          if [[ -n "${PATCH_B64}" && ! "${PATCH_B64}" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]; then
            echo "Invalid patch_b64" >&2
            exit 1
          fi
          if [[ "${VERIFY_WORKDIR}" == *..* || "${VERIFY_WORKDIR}" == /* || "${VERIFY_WORKDIR}" == *\\* || "${VERIFY_WORKDIR}" == *$'\n'* || "${VERIFY_WORKDIR}" == *$'\r'* ]]; then
            echo "Invalid workdir" >&2
            exit 1
          fi
          if [[ -n "${CONTAINER_IMAGE}" && ! "${CONTAINER_IMAGE}" =~ ^[a-z0-9][a-z0-9._/-]*(:[0-9]+)?([a-z0-9._/-]*)(:[a-zA-Z0-9._-]+)?(@sha256:[a-f0-9]{64})?$ ]]; then
            echo "Invalid container_image" >&2
            exit 1
          fi
          if [[ "${VERIFY_PHASE}" != "baseline" && "${VERIFY_PHASE}" != "candidate" ]]; then
            echo "Invalid phase" >&2
            exit 1
          fi
          if [[ ! "${REPETITION}" =~ ^[1-9][0-9]*$ || ! "${REPETITION_COUNT}" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid repetition" >&2
            exit 1
          fi
          if (( REPETITION > REPETITION_COUNT || REPETITION_COUNT > 100 )); then
            echo "Invalid repetition range" >&2
            exit 1
          fi
          if [[ "${VERIFY_PHASE}" == "baseline" && -n "${PATCH_B64}" ]]; then
            echo "A baseline cannot include a patch" >&2
            exit 1
          fi
          if [[ "${VERIFY_PHASE}" == "candidate" && -z "${PATCH_B64}" ]]; then
            echo "A candidate requires a patch" >&2
            exit 1
          fi

      - name: Check out target repo at head SHA
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.head_sha }}
          persist-credentials: false
          path: target

      - name: Apply candidate patch
        if: inputs.patch_b64 != ''
        working-directory: target
        env:
          PATCH_B64: ${{ inputs.patch_b64 }}
        run: |
          set -euo pipefail
          printf '%s' "${PATCH_B64}" | base64 --decode > "${RUNNER_TEMP}/ci-fix.patch"
          git -c core.hooksPath=/dev/null apply --index --whitespace=nowarn "${RUNNER_TEMP}/ci-fix.patch"

      - name: Run targeted verification
        env:
          VERIFY_COMMAND: ${{ inputs.verify_command }}
          VERIFY_WORKDIR: ${{ inputs.workdir }}
          CONTAINER_IMAGE: ${{ inputs.container_image }}
        run: |
          set -euo pipefail
          repo="${GITHUB_WORKSPACE}/target"
          host_workdir="${repo}"
          container_workdir="/src"
          if [[ -n "${VERIFY_WORKDIR}" ]]; then
            host_workdir="${repo}/${VERIFY_WORKDIR}"
            container_workdir="/src/${VERIFY_WORKDIR}"
          fi
          if [[ ! -d "${host_workdir}" ]]; then
            echo "Verification workdir does not exist" >&2
            exit 1
          fi

          if [[ -z "${CONTAINER_IMAGE}" ]]; then
            cd "${host_workdir}"
            /bin/bash --noprofile --norc -e -o pipefail -c "${VERIFY_COMMAND}"
            exit
          fi

          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --user "$(id -u):$(id -g)" \
            --volume "${repo}:/src" \
            --workdir /src \
            --entrypoint /bin/sh \
            "${CONTAINER_IMAGE}" \
            -e -c 'cd "$1" && /bin/sh -e -c "$2"' -- \
            "${container_workdir}" "${VERIFY_COMMAND}"
