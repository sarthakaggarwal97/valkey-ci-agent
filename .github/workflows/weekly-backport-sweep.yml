name: Weekly Backport Sweep

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      repo:
        description: "Source repository to backport from"
        required: false
        type: string
        default: "valkey-io/valkey"
      project_owner:
        description: "GitHub Project v2 owner"
        required: false
        type: string
        default: "valkey-io"
      project_owner_type:
        description: "Project owner type"
        required: false
        type: choice
        options:
          - organization
          - user
        default: organization
      project_number:
        description: "GitHub Project v2 number"
        required: false
        type: string
      status_value:
        description: "Project status value to sweep"
        required: false
        type: string
        default: "To be backported"
      push_repo:
        description: "Push backport PRs to this repo (default: fork from repo var)"
        required: false
        type: string
        default: ""
      only_branch:
        description: "Only sweep this release branch (empty = all)"
        required: false
        type: string
        default: ""
      implicit_target_branch:
        description: "Target branch implied by this project (e.g., '8.1' for project 14)"
        required: false
        type: string
        default: ""
      max_candidates:
        description: "Cap candidates per branch (0 = unlimited)"
        required: false
        type: string
        default: "0"
      test_commands:
        description: "Test commands to run after cherry-pick (newline-separated). Default is build-only; 'make test' is too flaky for batch validation."
        required: false
        type: string
        default: "make -j$(nproc)"
      dry_run:
        description: "Discovery only — don't cherry-pick or push"
        required: false
        default: true
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # Matrix over all Valkey per-release backport projects. On scheduled
    # runs we fan out across 5 release branches. On workflow_dispatch, if
    # the caller passed project_number, only that one matrix leg will
    # actually do work (others are short-circuited by the "skip unless
    # matching" guard below).
    strategy:
      fail-fast: false
      matrix:
        project:
          - { number: 1,  branch: "7.2" }
          - { number: 2,  branch: "8.0" }
          - { number: 14, branch: "8.1" }
          - { number: 18, branch: "9.0" }
          - { number: 41, branch: "9.1" }
    concurrency:
      group: weekly-backport-sweep-${{ inputs.repo || 'valkey-io/valkey' }}-${{ matrix.project.number }}
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      CLAUDE_CODE_USE_BEDROCK: "1"
      CI_AGENT_EVIDENCE_DIR: agent-evidence
      REPO_FULL_NAME: ${{ inputs.repo || 'valkey-io/valkey' }}
      PROJECT_OWNER: ${{ inputs.project_owner || 'valkey-io' }}
      PROJECT_OWNER_TYPE: ${{ inputs.project_owner_type || 'organization' }}
      # On dispatch: caller's explicit project_number wins. On schedule
      # (or when caller didn't specify): use the matrix leg's project.
      PROJECT_NUMBER: ${{ inputs.project_number || matrix.project.number }}
      STATUS_VALUE: ${{ inputs.status_value || 'To be backported' }}
      PUSH_REPO: ${{ inputs.push_repo || vars.VALKEY_BACKPORT_PUSH_REPO || '' }}
      ONLY_BRANCH: ${{ inputs.only_branch || '' }}
      IMPLICIT_TARGET_BRANCH: ${{ inputs.implicit_target_branch || '' }}
      MAX_CANDIDATES: ${{ inputs.max_candidates || '0' }}
      TEST_COMMANDS: ${{ inputs.test_commands || 'make -j$(nproc)' }}
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && 'true' || 'false' }}
      VALKEY_CI_AGENT_ALLOW_VALKEY_IO_PUBLISH: ${{ vars.VALKEY_CI_AGENT_ALLOW_VALKEY_IO_PUBLISH || '' }}
    steps:
      - name: Skip non-matching matrix leg on targeted dispatch
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          # If the dispatch explicitly passed a project_number, only the
          # matrix leg for that project should do work. Other legs exit
          # successfully without any side effects.
          INPUT_PN="${{ inputs.project_number }}"
          MATRIX_PN="${{ matrix.project.number }}"
          if [[ -n "${INPUT_PN}" && "${INPUT_PN}" != "${MATRIX_PN}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping matrix leg project=${MATRIX_PN} (dispatch targeted project=${INPUT_PN})"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check out agent repository
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        if: steps.guard.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Resolve target repository token
        if: steps.guard.outputs.skip != 'true'
        id: token
        shell: bash
        env:
          VALKEY_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${VALKEY_GITHUB_TOKEN}" ]]; then
            echo "VALKEY_GITHUB_TOKEN secret is required (needs read:project scope)" >&2
            exit 1
          fi
          echo "token=${VALKEY_GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Validate project number
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        run: |
          if [[ -z "${PROJECT_NUMBER}" ]]; then
            echo "Project number is required. Set VALKEY_BACKPORT_PROJECT_NUMBER repo var or pass project_number input." >&2
            exit 1
          fi

      - name: Configure AWS credentials
        if: steps.guard.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: backport-sweep-${{ github.run_id }}-${{ matrix.project.number }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run backport sweep
        if: steps.guard.outputs.skip != 'true'
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          args=(
            -m scripts.backport.sweep
            --repo "${REPO_FULL_NAME}"
            --target-token "${TARGET_TOKEN}"
            --project-owner "${PROJECT_OWNER}"
            --project-number "${PROJECT_NUMBER}"
            --project-owner-type "${PROJECT_OWNER_TYPE}"
            --status-value "${STATUS_VALUE}"
            --verbose
          )

          if [[ -n "${PUSH_REPO}" ]]; then
            args+=(--push-repo "${PUSH_REPO}")
          fi

          if [[ -n "${ONLY_BRANCH}" ]]; then
            args+=(--only-branch "${ONLY_BRANCH}")
          fi

          if [[ -n "${IMPLICIT_TARGET_BRANCH}" ]]; then
            args+=(--implicit-target-branch "${IMPLICIT_TARGET_BRANCH}")
          fi

          if [[ "${MAX_CANDIDATES}" != "0" ]]; then
            args+=(--max-candidates "${MAX_CANDIDATES}")
          fi

          if [[ -n "${TEST_COMMANDS}" ]]; then
            args+=(--test-commands "${TEST_COMMANDS}")
          fi

          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--discover-only)
          fi

          python "${args[@]}" | tee backport-sweep-result.json

      - name: Upload result
        if: always() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backport-sweep-result-${{ github.run_id }}-p${{ matrix.project.number }}
          path: backport-sweep-result.json
          retention-days: 30

      - name: Upload agent evidence
        if: always() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backport-sweep-agent-evidence-${{ github.run_id }}-p${{ matrix.project.number }}
          path: agent-evidence
          if-no-files-found: ignore
          retention-days: 30
