name: Monitor Valkey Fuzzer Runs

on:
  schedule:
    - cron: "41 */4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List pending runs without analyzing or filing issues."
        required: false
        default: false
        type: boolean

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    if: ${{ github.event_name == 'workflow_dispatch' || github.repository == 'valkey-io/valkey-ci-agent' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: monitor-valkey-fuzzer
      cancel-in-progress: false
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      CLAUDE_CODE_USE_BEDROCK: "1"
      CI_AGENT_EVIDENCE_DIR: agent-evidence
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && 'true' || 'false' }}
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent
        with:
          install-claude: "true"

      - name: Generate GitHub App token
        id: generate-token-1
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey-fuzzer
          permission-actions: read
          permission-contents: read
          permission-issues: write
          permission-metadata: read

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-fuzzer-monitor-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Process pending fuzzer runs (1/2)
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.generate-token-1.outputs.token }}
        run: |
          set -euo pipefail
          max_runs=1
          if [[ "${DRY_RUN}" == "true" ]]; then
            max_runs=2
          fi
          args=(
            -m scripts.fuzzer.main
            --max-runs "${max_runs}"
            --output fuzzer-monitor-result-1.json
          )
          if [[ "${DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          python "${args[@]}"

      # Each analysis can include a retry. Renew both short-lived credential
      # sets before the second run instead of sharing a one-hour lease.
      - name: Generate second GitHub App token
        if: ${{ success() && env.DRY_RUN != 'true' }}
        id: generate-token-2
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          repositories: valkey-fuzzer
          permission-actions: read
          permission-contents: read
          permission-issues: write
          permission-metadata: read

      - name: Refresh AWS credentials
        if: ${{ success() && env.DRY_RUN != 'true' }}
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: valkey-fuzzer-monitor-2-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Process pending fuzzer runs (2/2)
        if: ${{ success() && env.DRY_RUN != 'true' }}
        shell: bash
        env:
          TARGET_TOKEN: ${{ steps.generate-token-2.outputs.token }}
        run: |
          set -euo pipefail
          python -m scripts.fuzzer.main \
            --max-runs 1 \
            --output fuzzer-monitor-result-2.json

      - name: Upload fuzzer analysis result
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: valkey-fuzzer-monitor-result-${{ github.run_id }}
          path: fuzzer-monitor-result-*.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload agent evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: valkey-fuzzer-agent-evidence-${{ github.run_id }}
          path: agent-evidence
          if-no-files-found: ignore
          retention-days: 30
