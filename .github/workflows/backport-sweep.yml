name: Backport Sweep

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: "Filter to this repository (empty = all repos)"
        required: false
        type: string
        default: ""
      project_number:
        description: "Filter to this project number (empty = all)"
        required: false
        type: string
        default: ""
      max_candidates:
        description: "Maximum candidates per branch (0 = no caller cap)"
        required: false
        type: number
        default: 2
      dry_run:
        description: "Discover candidates without running backports"
        required: false
        default: true
        type: boolean

permissions: {}

jobs:
  candidates:
    if: >-
      ${{
        vars.VALKEY_CI_AGENT_KILL_SWITCH != 'true' &&
        vars.VALKEY_CI_AGENT_DISABLE_BACKPORT != 'true'
      }}
    permissions:
      contents: read
    uses: ./.github/workflows/backport-candidates.yml
    with:
      repo: ${{ inputs.repo || '' }}
      project_number: ${{ inputs.project_number || '' }}
      max_candidates: ${{ github.event_name != 'workflow_dispatch' && 2 || inputs.max_candidates }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
      mode: sweep
    secrets:
      AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
      VALKEYRIE_BOT_APP_ID: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
      VALKEYRIE_BOT_PRIVATE_KEY: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
