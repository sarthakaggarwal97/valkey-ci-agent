name: CI Fix Comment Poll

# Scans recent PR comments in every repository with ci_fix.enabled in repos.yml
# for "@valkeyrie-ops fix <ci-link>" and dispatches the ci-fix workflow for each
# new one. The trigger only; the fix itself runs in ci-fix.yml. Idempotency is a
# reaction marker on the comment, so overlapping or replayed ticks never
# double-dispatch.

on:
  schedule:
    # One runner polls immediately and again 30 minutes later. This avoids
    # relying on GitHub's scheduled-workflow queue for every 30-minute tick.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      lookback_minutes:
        description: "Comment lookback window in minutes (default 180; widen to backfill after an outage, capped at 7 days)"
        required: false
        type: string
        default: "180"

permissions: {}

jobs:
  poll:
    name: "Poll for fix commands"
    if: github.repository == 'valkey-io/valkey-ci-agent'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    concurrency:
      group: ci-fix-comment-poll
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up agent dependencies
        uses: ./.github/actions/setup-agent

      - name: Resolve CI fix repositories
        id: targets
        shell: bash
        run: |
          set -euo pipefail
          python -m scripts.ci_fix.registry \
            --registry repos.yml \
            token-scope \
            --owner valkey-io \
            --include-repository valkey-io/valkey-ci-agent >> "${GITHUB_OUTPUT}"

      - name: Generate App token
        id: token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.VALKEYRIE_BOT_APP_ID }}
          private-key: ${{ secrets.VALKEYRIE_BOT_PRIVATE_KEY }}
          owner: valkey-io
          repositories: ${{ steps.targets.outputs.repositories }}
          permission-members: read
          permission-issues: write
          permission-pull-requests: read
          permission-actions: write
          permission-metadata: read

      - name: Poll and dispatch
        env:
          CI_FIX_POLL_TOKEN: ${{ steps.token.outputs.token }}
          CI_FIX_POLL_APP_SLUG: ${{ steps.token.outputs.app-slug }}
          CI_FIX_POLL_LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '180' }}
          CI_FIX_POLL_INTERVAL_SECONDS: ${{ github.event_name == 'schedule' && '1800' || '0' }}
          CI_FIX_POLL_DURATION_SECONDS: ${{ github.event_name == 'schedule' && '3300' || '0' }}
          CI_FIX_POLL_REGISTRY: repos.yml
        run: python -m scripts.ci_fix.comment_poll
