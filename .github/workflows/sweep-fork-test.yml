name: Backport Sweep Fork Test

# THROWAWAY fork-testing workflow for the backport sweep. Runs the real
# scripts.backport.sweep against the personal fork and a user-owned project
# board, using a PAT for GitHub/board access and the fork's OIDC role for
# Bedrock (real Claude). Never the production App, never any valkey-io repo.
# Not for upstream.

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: "Target branch to sweep onto"
        required: true
        type: string
      project_number:
        description: "User project board number"
        required: true
        type: string
        default: "1"
      max_candidates:
        description: "Cap applied cherry-picks (0 = unlimited)"
        required: false
        type: string
        default: "5"
      aws_region:
        required: false
        type: string
        default: "us-east-1"

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLAUDE_CODE_USE_BEDROCK: "1"

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Write fork registry
        run: |
          cat > /tmp/fork-repos.yml <<YAML
          repos:
            - repo: sarthakaggarwal97/valkey-ci-agent
              project_owner: sarthakaggarwal97
              project_owner_type: user
              language: text
              build_commands: []
              repair_validation_failures: false
              backport_label: backport
              llm_conflict_label: ai-resolved-conflicts
              max_conflicting_files: 100
              branches:
                - branch: "${{ inputs.target_branch }}"
                  project_number: ${{ inputs.project_number }}
          YAML

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: sweep-fork-test-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Run backport sweep (real Claude)
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          CI_AGENT_DIFF_COMMENT_LOGIN: sarthakaggarwal97
          TARGET_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
          MAX_CANDIDATES: ${{ inputs.max_candidates }}
        run: |
          set -euo pipefail
          python -m scripts.backport.sweep \
            --registry /tmp/fork-repos.yml \
            --repo sarthakaggarwal97/valkey-ci-agent \
            --branch "${TARGET_BRANCH}" \
            --target-token "${TARGET_TOKEN}" \
            --max-candidates "${MAX_CANDIDATES}" \
            --verbose
