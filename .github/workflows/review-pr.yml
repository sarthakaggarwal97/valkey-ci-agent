name: Review Pull Request

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the PR reviewer configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/pr-review-bot.yml"
      bot_repository:
        description: "Repository containing the PR reviewer bot code"
        required: false
        type: string
        default: "valkey-io/valkey-ci-bot"
      bot_ref:
        description: "Git ref of the PR reviewer repository to check out"
        required: false
        type: string
        default: "v1"
      mode:
        description: "Reviewer mode: review, chat, or auto"
        required: false
        type: string
        default: "auto"
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      GITHUB_TOKEN:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout bot repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.bot_repository }}
          ref: ${{ inputs.bot_ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PR reviewer
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python scripts/pr_review_main.py \
            --repo "${{ github.repository }}" \
            --config "${{ inputs.config_path }}" \
            --mode "${{ inputs.mode }}" \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --aws-region "${{ secrets.AWS_REGION }}"
