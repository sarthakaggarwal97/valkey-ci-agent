name: Review Pull Request

on:
  workflow_call:
    inputs:
      config_path:
        description: "Path to the PR reviewer configuration file in the consumer repo"
        required: false
        type: string
        default: ".github/pr-review-bot.yml"
      mode:
        description: "Reviewer mode: review, chat, or auto"
        required: false
        type: string
        default: "auto"
      aws_region:
        description: "AWS region where Bedrock is available"
        required: false
        type: string
        default: "us-east-1"
    secrets:
      AWS_ROLE_ARN:
        required: true
      VALKEY_GITHUB_APP_ID:
        description: "GitHub App ID for the bot identity (optional, falls back to github.token)"
        required: false
      VALKEY_GITHUB_APP_PRIVATE_KEY:
        description: "GitHub App private key for the bot identity (optional, falls back to github.token)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout bot repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate GitHub App token
        if: ${{ secrets.VALKEY_GITHUB_APP_ID != '' && secrets.VALKEY_GITHUB_APP_PRIVATE_KEY != '' }}
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VALKEY_GITHUB_APP_ID }}
          private-key: ${{ secrets.VALKEY_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN || secrets.CI_BOT_AWS_ROLE_ARN }}
          role-session-name: valkey-pr-review-bot-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Run PR reviewer
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          python -m scripts.pr_review_main \
            --repo "${{ github.repository }}" \
            --config "${{ inputs.config_path }}" \
            --mode "${{ inputs.mode }}" \
            --token "${{ steps.app-token.outputs.token || github.token }}" \
            --aws-region "${{ inputs.aws_region }}"
