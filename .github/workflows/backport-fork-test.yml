name: Backport Fork Test

# THROWAWAY fork-testing workflow for the backport pipeline. Runs the real
# scripts.backport.main against the personal fork using a classic PAT for
# GitHub writes and the fork's OIDC role for Bedrock (real Claude). Never the
# production App, never any valkey-io repo. Not for upstream.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged source PR number on the fork to backport"
        required: true
        type: string
      target_branch:
        description: "Target branch to backport onto"
        required: true
        type: string
      aws_region:
        description: "AWS region for Bedrock"
        required: false
        type: string
        default: "us-east-1"

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLAUDE_CODE_USE_BEDROCK: "1"

jobs:
  backport:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out agent repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install -g @anthropic-ai/claude-code

      - name: Write fork registry
        run: |
          cat > /tmp/fork-repos.yml <<'YAML'
          repos:
            - repo: sarthakaggarwal97/valkey-ci-agent
              project_owner: sarthakaggarwal97
              project_owner_type: user
              language: text
              build_commands: []
              repair_validation_failures: false
              backport_label: backport
              llm_conflict_label: ai-resolved-conflicts
              max_conflicting_files: 100
              branches:
                - branch: "${{ inputs.target_branch }}"
                  project_number: 1
          YAML

      - name: Configure AWS credentials from OIDC role
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: backport-fork-test-${{ github.run_id }}
          aws-region: ${{ inputs.aws_region }}

      - name: Run backport pipeline (real Claude)
        env:
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
          BACKPORT_GITHUB_TOKEN: ${{ secrets.VALKEY_GITHUB_TOKEN }}
          # Comments are authored by the PAT user, so the ownership gate matches.
          CI_AGENT_DIFF_COMMENT_LOGIN: sarthakaggarwal97
          PR_NUMBER: ${{ inputs.pr_number }}
          TARGET_BRANCH: ${{ inputs.target_branch }}
        run: |
          set -euo pipefail
          if [[ ! "${PR_NUMBER}" =~ ^[0-9]+$ ]]; then
            echo "Invalid pr_number" >&2; exit 1
          fi
          if [[ ! "${TARGET_BRANCH}" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "Invalid target_branch" >&2; exit 1
          fi
          python -m scripts.backport.main \
            --registry /tmp/fork-repos.yml \
            --repo sarthakaggarwal97/valkey-ci-agent \
            --pr-number "${PR_NUMBER}" \
            --target-branch "${TARGET_BRANCH}" \
            --verbose
