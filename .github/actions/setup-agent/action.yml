name: Set up Valkey CI agent
description: Install Python and project dependencies for valkey-ci-agent workflows.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.11"
  install-mode:
    description: "Dependency set to install: runtime or dev."
    required: false
    default: runtime
  install-claude:
    description: Install the Claude Code CLI used by AI-backed agent jobs.
    required: false
    default: "false"
  install-sandbox:
    description: Install bubblewrap for AI profiles that require process isolation.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs['python-version'] }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs['python-version'] }}
        cache: "pip"

    - name: Validate install options
      shell: bash
      env:
        INSTALL_MODE: ${{ inputs['install-mode'] }}
        INSTALL_CLAUDE: ${{ inputs['install-claude'] }}
        INSTALL_SANDBOX: ${{ inputs['install-sandbox'] }}
      run: |
        set -euo pipefail
        case "${INSTALL_MODE}" in
          runtime|dev) ;;
          *)
            echo "::error::install-mode must be 'runtime' or 'dev'"
            exit 1
            ;;
        esac
        case "${INSTALL_CLAUDE}" in
          true|false) ;;
          *)
            echo "::error::install-claude must be 'true' or 'false'"
            exit 1
            ;;
        esac
        case "${INSTALL_SANDBOX}" in
          true|false) ;;
          *)
            echo "::error::install-sandbox must be 'true' or 'false'"
            exit 1
            ;;
        esac

    - name: Install runtime dependencies
      if: ${{ inputs['install-mode'] == 'runtime' }}
      shell: bash
      run: python -m pip install .

    - name: Install development dependencies
      if: ${{ inputs['install-mode'] == 'dev' }}
      shell: bash
      run: python -m pip install -e ".[dev]"

    - name: Install Claude Code
      if: ${{ inputs['install-claude'] == 'true' }}
      shell: bash
      run: npm install -g @anthropic-ai/claude-code@2.1.175

    - name: Install Claude process sandbox
      if: ${{ inputs['install-sandbox'] == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v bwrap >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes bubblewrap
        fi
        bwrap --version
