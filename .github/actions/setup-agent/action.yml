name: Set up Valkey CI agent
description: Install Python and project dependencies for valkey-ci-agent workflows.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.11"
  install-mode:
    description: "Dependency set to install: runtime or dev."
    required: false
    default: runtime
  install-claude:
    description: Install the Claude Code CLI used by AI-backed agent jobs.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python ${{ inputs['python-version'] }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs['python-version'] }}
        cache: "pip"

    - name: Validate install options
      shell: bash
      env:
        INSTALL_MODE: ${{ inputs['install-mode'] }}
        INSTALL_CLAUDE: ${{ inputs['install-claude'] }}
      run: |
        set -euo pipefail
        case "${INSTALL_MODE}" in
          runtime|dev) ;;
          *)
            echo "::error::install-mode must be 'runtime' or 'dev'"
            exit 1
            ;;
        esac
        case "${INSTALL_CLAUDE}" in
          true|false) ;;
          *)
            echo "::error::install-claude must be 'true' or 'false'"
            exit 1
            ;;
        esac

    - name: Install runtime dependencies
      if: ${{ inputs['install-mode'] == 'runtime' }}
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --require-hashes -r requirements/runtime.txt
        python -m pip install --no-deps --no-build-isolation .

    - name: Install development dependencies
      if: ${{ inputs['install-mode'] == 'dev' }}
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --require-hashes -r requirements/dev.txt
        python -m pip install --no-deps --no-build-isolation -e .

    - name: Install Claude Code
      if: ${{ inputs['install-claude'] == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        npm ci \
          --prefix .github/actions/setup-agent/claude \
          --no-audit \
          --no-fund
        echo "${GITHUB_WORKSPACE}/.github/actions/setup-agent/claude/node_modules/.bin" >> "${GITHUB_PATH}"
